services:
  embedding:
    build: .
    container_name: legal-assistant-embedding
    restart: unless-stopped
    environment:
      - EMBEDDING_SERVICE_TOKEN=${EMBEDDING_SERVICE_TOKEN}
      - BGE_USE_FP16=${BGE_USE_FP16:-false}
      - BGE_MAX_LENGTH=${BGE_MAX_LENGTH:-8192}
      - RERANK_BATCH_SIZE=${RERANK_BATCH_SIZE:-6}
    volumes:
      - hf_cache:/srv/.cache/huggingface
    expose:
      - "8000"
    # No published host port: only Caddy talks to this service.
    # mem_limit caps resident RAM; memswap_limit allows spilling into the
    # host swap file as a cushion instead of a hard OOM-kill during the
    # ColBERT rerank spike. If the box leans on this swap under load, that
    # itself is the signal to upsize per the Phase 2 brief.
    mem_limit: 3800m
    memswap_limit: 7800m
    mem_swappiness: 60

  caddy:
    image: caddy:2-alpine
    container_name: legal-assistant-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - embedding

volumes:
  hf_cache:
  caddy_data:
  caddy_config:
